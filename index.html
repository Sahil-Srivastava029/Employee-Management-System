<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Employee Management System</h1>
        <nav>
            <ul>
                <li><a href="#register">Register</a></li>
                <li><a href="#employees">Employees</a></li>
            </ul>
        </nav>
    </header>

    <!-- Dashboard -->

    <section class="dashboard">
        <div class="card">
            <h3>Total Employees</h3>
            <p id="totalEmployees">0</p>
        </div>
        <div class="card">
            <h3>Departments</h3>
            <p id="totalDepartments">0</p>
        </div>
        <div class="card">
            <h3>Average Salary</h3>
            <p id="averageSalary">₹0</p>
        </div>
    </section>

    <!-- Registration Form -->

    <section id="register">
        <h2>Employee Registration</h2>
        <form id="employeeForm">
            <div class="input-group">
                <label>Employee Name</label>
                <input
                    type="text"
                    id="name"
                    required>
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input
                    type="email"
                    id="email"
                    required>
            </div>
            <div class="input-group">
                <label>Department</label>
                <select id="department" required>
                    <option value="">Select Department</option>
                    <option>HR</option>
                    <option>IT</option>
                    <option>Sales</option>
                    <option>Finance</option>
                    <option>Marketing</option>
                </select>
            </div>
            <div class="input-group">
                <label>Position</label>
                <input
                    type="text"
                    id="position"
                    required>
            </div>

            <div class="input-group">
                <label>Salary</label>
                <input
                    type="number"
                    id="salary"
                    required>
            </div>

            <div class="buttons">
                <button type="submit">
                    Register Employee
                </button>
                <button type="reset">
                    Reset
                </button>
            </div>
        </form>
    </section>

    <!-- Search -->

    <section class="search-section">
        <input
            type="text"
            id="searchName"
            placeholder="Search by Name">
        <select id="searchDepartment">
            <option value="All">
                All Departments
            </option>

            <option>HR</option>

            <option>IT</option>

            <option>Sales</option>

            <option>Finance</option>

            <option>Marketing</option>
        </select>
    </section>

    <!-- Employee Table -->

    <section id="employees">
        <h2>Employee Records</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>

                        <th>Name</th>

                        <th>Email</th>

                        <th>Department</th>

                        <th>Position</th>

                        <th>Salary</th>

                        <th>Action</th>

                    </tr>
                </thead>
                <tbody id="employeeTable">

                    <!-- Employees added using JavaScript -->

                </tbody>
            </table>
        </div>
    </section>

    <!-- Footer -->

    <footer>
        <p>
            © 2026 Employee Management System
        </p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
